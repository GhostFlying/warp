name: Fork CI

on:
  push:
    branches:
      - fork
      - "sync/upstream-master-*"
  pull_request:
    branches:
      - fork
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-agent-tab-color:
    name: CLI agent tab color tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: "false"

      - name: Run focused tests
        run: cargo test -p warp --lib cli_agent_tab_color
